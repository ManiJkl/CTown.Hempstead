<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Linktree-style page to share links and access them by QR." />
    <title>Daltoniko | Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">Quick links</p>
          <h1>FOLLOW US TO WIN!</h1>
          <p class="intro">
            Access our social channels and leave your review on Maps.
          </p>
        </div>
      </section>

      <section class="links-card" id="links">
        <div class="section-head">
          <div>
            <p class="panel-label">Connect with me</p>
            <h2>Choose an option</h2>
          </div>
          <p class="section-note">Change the links in <span>app.js</span> whenever you want.</p>
        </div>

        <div class="links-grid" id="linksGrid" aria-label="Links list"></div>
      </section>
    </main>

    <template id="linkTemplate">
      <a class="link-tile" target="_blank" rel="noreferrer noopener">
        <div class="link-icon" aria-hidden="true"></div>
        <div class="link-copy">
          <strong></strong>
          <span></span>
        </div>
        <span class="link-arrow" aria-hidden="true">↗</span>
      </a>
    </template>
    <script src="app.js"></script>
  </body>
</html>
