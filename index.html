<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Página tipo Linktree para compartir enlaces y acceder por QR." />
    <title>Daltoniko | Enlaces</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">Enlaces rápidos</p>
          <h1>FOLLOW US TO WIN!</h1>
          <p class="intro">
            Accede a nuestras redes y deja tu reseña en Maps.
          </p>
        </div>
      </section>

      <section class="links-card" id="links">
        <div class="section-head">
          <div>
            <p class="panel-label">Conecta conmigo</p>
            <h2>Elige una opción</h2>
          </div>
          <p class="section-note">Cambia los enlaces en <span>app.js</span> cuando quieras.</p>
        </div>

        <div class="links-grid" id="linksGrid" aria-label="Lista de enlaces"></div>
      </section>
    </main>

    <template id="linkTemplate">
      <a class="link-tile" target="_blank" rel="noreferrer noopener">
        <div class="link-icon" aria-hidden="true"></div>
        <div class="link-copy">
          <strong></strong>
          <span></span>
        </div>
        <span class="link-arrow" aria-hidden="true">↗</span>
      </a>
    </template>
    <script src="app.js"></script>
  </body>
</html>
